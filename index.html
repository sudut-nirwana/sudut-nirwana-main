<!DOCTYPE html>
<html lang="id">
<head>

    <title>Sudut Nirwana | Digital Studio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #1a1a1a; color: white; text-align: center; }

        .card:hover { background: #00d4ff; color: #1a1a1a; transform: translateY(-5px); }
        .footer { margin-top: 50px; font-size: 0.8rem; color: #666; }

        <h1>Sudut Nirwana</h1>

        <div class="menu-grid">

                <p>Kumpulan karya visual kami</p>

            <a href="/rental" class="card">
