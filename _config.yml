title: Sudut Nirwana
description: "Koleksi chord gitar dan tablature lagu terlengkap untuk pemula. Update setiap hari dengan fitur auto-scroll dan transpose nada."
url: "https://sudutnirwana.com"
baseurl: ""

# Struktur URL SEO Friendly
permalink: /chord/:title/

# Markdown engine
markdown: kramdown

# Plugins wajib untuk Google (Sangat Penting!)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# File yang tidak perlu diproses
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

