---
layout: default
---
<link rel="stylesheet" href="{{ '/assets/css/chord-style.css' | relative_url }}">

<div class="chord-wrapper">
    <nav class="breadcrumb">
        <a href="/">Beranda</a> &gt; <a href="/chord">Chord</a> &gt; <span>{{ page.title }}</span>
    </nav>

    <h1>{{ page.title }}</h1>

    <div class="sticky-controls" id="chord-controls">
        <div class="control-group">
            <button onclick="transpose(-1)">-</button>
            <span class="label">Transpose</span>
            <button onclick="transpose(1)">+</button>
        </div>
        
        <div class="control-group">
            <button id="scrollBtn" onclick="toggleScroll()">Auto Scroll</button>
            <input type="range" id="scrollSpeed" min="1" max="10" value="2" title="Kecepatan">
        </div>
    </div>

    <pre id="song-content">{{ content }}</pre>
</div>

<div id="overlay" onclick="closeModal()"></div>
<div id="chordModal">
    <div class="modal-header">
        <span id="modalTitle"></span>
        <button onclick="closeModal()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <img id="chordImg" src="" alt="Kunci Gitar">
    <button onclick="closeModal()" style="width:100%; padding:10px; margin-top:10px; cursor:pointer;">Tutup</button>
</div>

<script src="{{ '/assets/js/chord-logic.js' | relative_url }}"></script>
