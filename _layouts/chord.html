---
layout: chord
---
<link rel="stylesheet" href="{{ '/assets/css/chord-style.css' | relative_url }}">

<div class="chord-wrapper">
    <nav class="breadcrumb">
        <a href="/">Beranda</a> &gt; <span>{{ page.title }}</span>
    </nav>

    <h1 style="margin-bottom:15px;">{{ page.title }}</h1>

    <div class="sticky-controls" id="chord-controls">
        <div style="display:flex; align-items:center; gap:5px;">
            <button onclick="transpose(-1)">-</button>
            <span>Transpose</span>
            <button onclick="transpose(1)">+</button>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <button id="scrollBtn" onclick="toggleScroll()">Auto Scroll</button>
            <input type="range" id="scrollSpeed" min="1" max="10" value="2" style="width:60px;">
        </div>
    </div>

    <pre id="song-content">{{ content }}</pre>
</div>

<div id="overlay-chord" onclick="closeModal()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1999;"></div>
<div id="chordModal">
    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
        <span id="modalTitle"></span>
        <button onclick="closeModal()" style="border:none; background:none; font-size:20px;">&times;</button>
    </div>
    <img id="chordImg" src="" alt="Chord Diagram" style="width:100%;">
</div>

<script src="{{ '/assets/js/chord-logic.js' | relative_url }}"></script>
