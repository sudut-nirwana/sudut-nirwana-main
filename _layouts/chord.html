<div class="chord-main-wrapper">
    <div class="chord-container">
        
        <header class="chord-header">
            <h1 class="song-title">{{ page.title }}</h1>
            <p class="artist-name">{{ page.artist }}</p>
        </header>

        <div class="main-grid">
            <div class="content-left">
                
                <div id="control-panel" class="control-panel">
                    <div class="panel-tabs">
                        <button class="tab-btn active" data-target="transpose">Transpose</button>
                        <button class="tab-btn" data-target="tempo">Tempo</button>
                        <button class="tab-btn" data-target="scroll">Scroll</button>
                    </div>
                    
                    <div class="panel-body active" id="pane-transpose">
                        <div class="ui-row">
                            <button class="btn-modern" id="dec-ch">−</button>
                            <div class="display-box">
                                <span id="current-key">C</span>
                                <small>Kunci</small>
                            </div>
                            <button class="btn-modern" id="inc-ch">+</button>
                        </div>
                    </div>

                    <div class="panel-body" id="pane-tempo">
                        <div class="ui-row">
                            <input type="range" min="60" max="200" value="120" id="tempo-slider" style="width:70%; accent-color:var(--p-orange);">
                            <span id="tempo-val" style="font-weight:800; color:var(--p-orange)">120 BPM</span>
                        </div>
                    </div>

                    <div class="panel-body" id="pane-scroll">
                        <div class="ui-row">
                            <button id="start-scroll" class="btn-modern" style="width:auto; padding:0 20px;">▶️ Mulai</button>
                            <div class="display-box" style="flex-direction: row; display: flex; gap: 10px; align-items: center;">
                                <button class="btn-small" id="speed-down" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">−</button>
                                <span id="speed-val" style="font-size:18px">2x</span>
                                <button class="btn-small" id="speed-up" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chord-content">
                    <pre id="chord-sheet">{{ content }}</pre>
                </div>
            </div>

            <aside class="sidebar-right">
                <div class="video-card">
                    <div class="video-container-inner">
                        <iframe src="https://www.youtube.com/embed/{{ page.youtube_id }}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="chord-diagram-section">
                    <h3 style="color:#fff; font-size:18px;">Diagram Chord</h3>
                    <div id="chord-images-container" class="chord-grid"></div>
                </div>
            </aside>
        </div>

    </div>
</div>
