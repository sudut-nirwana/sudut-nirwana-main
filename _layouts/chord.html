---
layout: default
---

<div class="chord-container">
    <header class="chord-header">
        <h2>{{ page.title }}</h2>
        <span class="chord-artist">Noah - Chord Gitar</span>
    </header>

    <div class="chord-content">
{{ content }}
    </div>

    <div class="chord-tools">
        <button onclick="transposeChord(-1)">♭ Lower</button>
        <button onclick="transposeChord(1)">♯ Higher</button>
        <button onclick="toggleAutoScroll()">Auto Scroll</button>
    </div>
</div>

<link rel="stylesheet" href="{{ site.baseurl }}/assets/chord-style.css">
<script src="{{ site.baseurl }}/assets/chord-logic.js"></script>
