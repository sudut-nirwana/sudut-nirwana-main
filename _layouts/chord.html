---
layout: default
---
<link rel="stylesheet" href="{{ '/assets/css/chord-style.css' | relative_url }}">

<div class="chord-main-wrapper">
    <div class="chord-container">
        
        <header class="chord-header">
            <h1 class="song-title">{{ page.title }}</h1>
            <p class="artist-name">{{ page.artist }}</p>
        </header>

        <div class="chord-grid-layout">
            <div class="chord-left-col">
                
                <div id="control-panel" class="control-panel">
                    <div class="panel-tabs">
                        <div class="tab-item active" data-target="transpose">Transpose <span class="arrow">▼</span></div>
                        <div class="tab-item" data-target="tempo">Tempo <span class="arrow">▼</span></div>
                        <div class="tab-item" data-target="scroll">Scroll <span class="arrow">▼</span></div>
                    </div>

                    <div class="panel-content">
                        <div id="pane-transpose" class="tab-pane active">
                            <div class="modern-box-blue">
                                <button class="btn-action" id="dec-ch">−</button>
                                <div class="key-info">
                                    <span id="current-key">C</span>
                                    <small>TRANSPOSE NADANYA</small>
                                </div>
                                <button class="btn-action" id="inc-ch">+</button>
                            </div>
                        </div>

                        <div id="pane-tempo" class="tab-pane">
                            <div class="tempo-ui">
                                <input type="range" min="60" max="200" value="120" id="tempo-slider" class="grad-slider">
                                <span id="tempo-val">120 BPM</span>
                            </div>
                        </div>

                        <div id="pane-scroll" class="tab-pane">
                            <div class="scroll-ui">
                                <button id="start-scroll" class="btn-play-scroll">▶️ Mulai</button>
                                <div class="speed-control">
                                    <button id="speed-down">−</button>
                                    <span id="speed-val">2x</span>
                                    <button id="speed-up">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chord-sheet-area">
                    <pre id="chord-sheet">{{ content }}</pre>
                </div>

                <div class="chord-diagram-section">
                    <h3 class="side-title">Diagram Chord</h3>
                    <div id="chord-images-container" class="chord-img-grid"></div>
                </div>
            </div>

            <aside class="chord-sidebar">
                <div id="video-sidebar" class="sticky-video">
                    <div class="video-container">
                        <iframe width="100%" height="200" src="https://www.youtube.com/embed/{{ page.youtube_id }}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{{ '/assets/js/chord-logic.js' | relative_url }}"></script>
