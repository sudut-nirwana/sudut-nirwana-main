
---
layout: default
---

<div class="container" style="margin-top: 20px; margin-bottom: 50px;">
  <nav style="margin-bottom: 20px; font-size: 14px; color: #666;">
    <a href="/" style="color: #e67e22; text-decoration: none;">Beranda</a> &raquo; 
    <span style="color: #333;">{{ page.genre }}</span> &raquo; 
    <strong>{{ page.artist }}</strong>
  </nav>

  <article style="background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h1 style="color: #333; margin-bottom: 10px; font-size: 24px;">{{ page.title }}</h1>
    
    <div style="font-size: 14px; color: #888; margin-bottom: 20px;">
      Artis: <strong style="color: #444;">{{ page.artist }}</strong> | 
      Genre: <strong style="color: #444;">{{ page.genre }}</strong>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

    <pre style="
        font-family: 'Courier New', Courier, monospace; 
        font-size: 16px; 
        line-height: 1.8; 
        color: #2c3e50; 
        background: #fdfdfd; 
        padding: 15px; 
        border-left: 4px solid #e67e22; 
        overflow-x: auto; 
        white-space: pre-wrap;
        word-wrap: break-word;
    ">{{ content }}</pre>

  </article>
</div>
