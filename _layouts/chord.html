---
layout: default
---

<div class="chord-container">
    <header class="chord-header">
        <h2>{{ page.title }}</h2>
        <p class="chord-artist">Artis: {{ page.artist }}</p>
    </header>

    <div class="chord-content-wrapper">
        <pre>{{ content }}</pre>
    </div>

    <div class="chord-tools">
        <button onclick="transposeChord(1)"># Up</button>
        <button onclick="transposeChord(-1)">b Down</button>
        <button id="scrollBtn" onclick="toggleAutoScroll()">Auto Scroll</button>
    </div>
</div>

<link rel="stylesheet" href="/assets/chord-style.css">
<script src="/assets/chord-logic.js"></script>
