---
layout: default
---
<link rel="stylesheet" href="{{ '/assets/css/chord-style.css' | relative_url }}">


<section class="content-chord" id="content-chord">
   <div class="colom1">
      <div class="container">
         
         <nav class="breadcrumb-nav" aria-label="Breadcrumb">
            <div class="breadcrumb-container">
               <ul class="breadcrumb-list">
                  <li><a href="/"><i class="fa-solid fa-house"></i> Beranda</a></li>
                  
                  <li><a href="/chord">Chord</a></li>
                  
                  <li class="active" aria-current="page">{{ artist }}</li>
               </ul>
            </div>
         </nav>
         
         <!--menampilkan judul kontent dan title artis di bawah judul chord pada layout chord -->
         <header class="entry-header">
            <h2 class="chord-title">{{ title }}</h2>
            <div class="artist-subtitle">
               <i class="fa-solid fa-microphone-lines"></i> Chord Gitar & Lirik: <span>{{ artist }}</span>
            </div>
         </header>
      
         <!--untuk menampilkan google ads harus daftar dulu untuk mendapat code iklan nya di google.com/addsense-->
         <div class="ad-container">
            <small>Advertisement</small>
            <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-12345"
               data-ad-slot="67890"
               data-ad-format="auto">
            </ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
         </div>
         
         <!--mengambil wiget template dari bandsintown untuk menampilkan follow artis yg kunci gitar nya sednag di mainkan-->
         <div id="bt-widget-wrapper" class="bandsintown-layout">
            <a class="bit-widget-initializer" 
               id="bt-element"
               data-artist-name="{{ artist }}" 
               data-background-color="transparent"
               data-separator-color="#E1E1E1" 
               data-text-color="#333333"
               data-font="Arial, sans-serif"
               data-auto-style="true">
               Follow {{ artist }} on Bandsintown
            </a>
         </div>
      
         <!-- panel transpose nada-->
         <div class="chord-controls">
            <span class="control-label"><i class="fa-solid fa-music"></i> Nada Dasar</span>
            <div class="control-group">
               <div class="transpose-buttons">
                  <button onclick="transpose(-1)" class="btn-transpose" title="Turunkan Nada"><i class="fa-solid fa-minus"></i>
                  </button>
         
                  <span id="pitch-indicator">0</span>
                  <button onclick="transpose(1)" class="btn-transpose" title="Naikkan Nada"><i class="fa-solid fa-plus"></i>
                  </button>
               </div>
            </div>
            <button id="reset-btn" onclick="resetTranspose()" class="btn-reset"><i class="fa-solid fa-rotate-right"></i> Reset
            </button>
         </div>
         
         <!--isi dari kontent untama lirik lagu dan chord gitar mengambil dari file md-->
         <pre class="chord-content" id="chord-content">{{ content }}</pre>
      </div>
   </div>
   
   <!--menampilkan menu lain nya seperti lagu update dan nav alfabet-->
   <div class="colom2">
      <div id="bt-widget-wrapper">
         <div class="container">
            
         </div>
      </div>
   </div>
</section>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{{ '/assets/js/chord-logic.js' | relative_url }}"></script>
