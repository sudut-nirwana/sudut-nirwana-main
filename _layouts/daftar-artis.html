---
layout: default
---
<link rel="stylesheet" href="{{ '/assets/css/alfabet.css' | relative_url }}">

<div class="alphabet-page-content">
    <div class="container">
        <div class="section-header">
            {% if page.url contains '/genre/' %}
            <h2 class="main-title">Daftar Chord <span class="highlight">Genre {{ page.title }}</span></h2>
            <p>Temukan koleksi lagu terbaik dengan aliran musik {{ page.title }}</p>
            {% else %}
            <h2 class="main-title">Daftar Artis <span class="highlight">Inisial {{ page.title }}</span></h2>
            <p>Temukan chord gitar berdasarkan nama artis {{ page.title }}</p>
            {% endif %}
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const artistFilter = urlParams.get('artist');
        
        if (artistFilter) {
            const items = document.querySelectorAll('.chord-item-box');
            let found = false;

            items.forEach(item => {
                // Sembunyikan semua yang tidak sesuai dengan filter artis di URL
                if (item.getAttribute('data-artist') === artistFilter) {
                    item.style.display = 'block';
                    found = true;
                } else {
                    item.style.display = 'none';
                }
            });

            // Update Tampilan Judul jika sedang memfilter artis tertentu
            if (found) {
                const displayArtist = artistFilter.replace(/-/g, ' ').toUpperCase();
                const titleEl = document.querySelector('.main-title');
                const descEl = document.querySelector('.section-header p');
                
                if (titleEl) titleEl.innerHTML = `Chord <span class="highlight">${displayArtist}</span>`;
                if (descEl) descEl.innerText = `Menampilkan semua lagu dari ${displayArtist}`;
            }
        }
    });
</script>
